<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produto — LOVEL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="layout-banner"></div>
  <div id="layout-header"></div>

  <main>
    <section class="section pdp">
      <div class="container">
        <nav class="breadcrumb"><a href="index.html">Home</a> <span>/</span> <span id="pdp-category">Produto</span></nav>

        <div class="pdp__grid">
          <div class="pdp__gallery">
            <img id="pdp-main-image" class="pdp__main-image" src="" alt="">
            <div class="pdp__thumbs" id="pdp-thumbs"></div>
          </div>

          <div class="pdp__info">
            <div id="pdp-badges" class="pdp__badges"></div>
            <span class="product-card__brand" id="pdp-brand"></span>
            <h1 class="pdp__title" id="pdp-name"></h1>

            <div class="pdp__price-block">
              <span class="pdp__price" id="pdp-price"></span>
              <span class="product-card__price-old" id="pdp-old-price" style="display:none"></span>
              <span class="product-card__pix" id="pdp-pix"></span>
            </div>

            <div class="variant-selector pdp__variants" id="pdp-variants" role="group" aria-label="Selecionar volumetria"></div>

            <button class="btn btn--primary btn--lg" id="pdp-add-cart">Adicionar ao Carrinho</button>
            <a href="carrinho.html" class="btn btn--outline btn--lg" style="margin-top:0.5rem">Ver Carrinho</a>

            <div class="decant-info pdp__decant-tip" style="margin-top:1.5rem;padding:1rem">
              <div class="decant-info__icon" style="width:36px;height:36px;font-size:1rem">💧</div>
              <div class="decant-info__text">
                <strong>Fracionado vs. Frasco Inteiro</strong>
                <p style="font-size:0.75rem">Decants vêm em frasco spray próprio, sem caixa original. <a href="#" data-open-decant-modal style="color:var(--color-gold)">Saiba mais</a></p>
              </div>
            </div>

            <div class="pdp__description">
              <h3>Descrição</h3>
              <p id="pdp-description"></p>
            </div>

            <div class="pdp__notes" id="pdp-notes"></div>
          </div>
        </div>

        <section class="pdp__related-section">
          <h2 class="section__title" style="text-align:left;margin-bottom:1.5rem">Você também pode gostar</h2>
          <div class="pdp-related" id="pdp-related"></div>
        </section>
      </div>
    </section>
  </main>

  <div id="layout-footer"></div>
  <div id="layout-modal"></div>

  <script type="module" src="js/pages/product.js"></script>
</body>
</html>
